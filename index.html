<!DOCTYPE html>
<html>
<head>
    <title>7系条码清单助手</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root { --primary: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-size: 20px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; font-weight: bold; }
        input { font-size: 16px; padding: 12px; width: 100%; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        button.main-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        /* 列表样式 */
        .list-container { width: 100%; max-width: 450px; margin-top: 20px; }
        .list-header { font-weight: bold; color: #555; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .list-item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; text-align: center; }
        .item-info { text-align: left; margin-bottom: 8px; border-bottom: 1px dashed #eee; padding-bottom: 8px; padding-right: 40px; }
        .item-title { font-weight: bold; color: #333; font-size: 16px; }
        .item-sub { font-size: 12px; color: #888; margin-top: 2px; }
        .item-barcode-num { font-family: monospace; font-size: 18px; font-weight: bold; color: #000; margin: 5px 0; display: block; }
        .btn-del { position: absolute; right: 10px; top: 15px; background: #f8d7da; color: var(--danger); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        canvas { width: 100% !important; height: auto; }
    </style>
</head>
<body>

    <div class="card">
        <h2>7系条码清单助手</h2>
        <div class="input-group">
            <label>货号</label>
            <input type="tel" id="skuInput" placeholder="输入货号(如 16)">
        </div>
        <div class="input-group">
            <label>重量 (kg)</label>
            <input type="number" id="weightInput" step="0.001" placeholder="输入重量(如 0.525)">
        </div>
        <div class="input-group">
            <label>备注 (如：青瓜)</label>
            <input type="text" id="noteInput" placeholder="选填，方便辨认">
        </div>
        <button class="main-btn" onclick="addItem()">生成并加入清单</button>
    </div>

    <div class="list-container">
        <div class="list-header">
            <span>待扫清单</span>
            <span style="color:var(--danger); font-size:12px; font-weight:normal;" onclick="clearAll()">全部清空</span>
        </div>
        <div id="barcodeList"></div>
    </div>

    <script>
        // 初始化加载
        window.onload = renderList;

        function calculateEAN13(first12) {
            let sumOdd = 0, sumEven = 0;
            for (let i = 0; i < 12; i++) {
                let num = parseInt(first12[i]);
                if ((i + 1) % 2 === 0) sumEven += num;
                else sumOdd += num;
            }
            let total = sumOdd + (sumEven * 3);
            let checkDigit = (10 - (total % 10)) % 10;
            return first12 + checkDigit;
        }

        function addItem() {
            let skuRaw = document.getElementById("skuInput").value;
            let weightRaw = document.getElementById("weightInput").value;
            let note = document.getElementById("noteInput").value || "未命名商品";

            if (!skuRaw || isNaN(skuRaw)) { alert("请输入数字货号！"); return; }
            if (!weightRaw || isNaN(weightRaw)) { alert("请输入有效重量！"); return; }

            let sku = skuRaw.padStart(6, '0');
            let weightInGrams = Math.round(parseFloat(weightRaw) * 1000);
            let weightStr = weightInGrams.toString().padStart(5, '0');
            let first12 = "7" + sku + weightStr;
            let fullCode = calculateEAN13(first12);

            // 存储逻辑
            let list = JSON.parse(localStorage.getItem('barcode_list') || '[]');
            list.unshift({
                id: Date.now(),
                code: fullCode,
                note: note,
                detail: `货号:${sku} | 重量:${weightRaw}kg`
            });
            localStorage.setItem('barcode_list', JSON.stringify(list));
