<!DOCTYPE html>
<html>
<head>
    <title>7系条码助手-自动补全版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { text-align: center; color: #28a745; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: #666; margin-bottom: 5px; font-weight: bold; }
        input { font-size: 18px; padding: 12px; width: 100%; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #28a745; }
        button { font-size: 18px; padding: 14px; width: 100%; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        #result { margin-top: 25px; padding: 15px; background: #fff; border-radius: 8px; border: 2px dashed #28a745; display: none; text-align: center; }
        .code-display { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #333; margin-bottom: 10px; font-family: monospace; }
        svg { width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="card">
        <h2>7系补码神器</h2>
        
        <div class="input-group">
            <label>货号 (不足6位自动补0)</label>
            <input type="tel" id="skuInput" placeholder="例如: 16">
        </div>
        
        <div class="input-group">
            <label>重量 (kg)</label>
            <input type="number" id="weightInput" step="0.001" placeholder="例如: 0.525">
        </div>

        <button onclick="makeBarcode()">立即生成</button>

        <div id="result">
            <div id="fullCodeShow" class="code-display"></div>
            <svg id="barcode"></svg>
        </div>
    </div>

    <script>
        function calculateEAN13(first12) {
            let sumOdd = 0, sumEven = 0;
            for (let i = 0; i < 12; i++) {
                let num = parseInt(first12[i]);
                if ((i + 1) % 2 === 0) sumEven += num;
                else sumOdd += num;
            }
            let total = sumOdd + (sumEven * 3);
            let checkDigit = (10 - (total % 10)) % 10;
            return first12 + checkDigit;
        }

        function makeBarcode() {
            let skuRaw = document.getElementById("skuInput").value;
            let weightRaw = document.getElementById("weightInput").value;

            if (!skuRaw || isNaN(skuRaw)) { alert("请输入数字货号！"); return; }
            if (!weightRaw || isNaN(weightRaw)) { alert("请输入有效重量！"); return; }

            // --- 核心逻辑 ---
            // 1. 货号处理：补齐到 6 位
            let sku = skuRaw.padStart(6, '0');
            
            // 2. 重量处理：转为克并补齐到 5 位
            let weightInGrams = Math.round(parseFloat(weightRaw) * 1000);
            let weightStr = weightInGrams.toString().padStart(5, '0');
            
            // 3. 拼装前 12 位：7 + 6位货号 + 5位重量
            let first12 = "7" + sku + weightStr;

            // 4. 计算第 13 位
            let fullCode = calculateEAN13(first12);
            
            // 5. 显示结果
            document.getElementById("result").style.display = "block";
            document.getElementById("fullCodeShow").innerText = fullCode;
            
            JsBarcode("#barcode", fullCode, {
                format: "EAN13",
                width: 2.5,
                height: 85,
                displayValue: false
            });
        }
    </script>
</body>
</html>
