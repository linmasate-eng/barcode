<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>极简二维码</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://lib.baomitu.com/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { text-align: center; padding: 20px; font-family: sans-serif; }
        input { width: 80%; padding: 10px; margin: 10px 0; font-size: 16px; border: 1px solid #ccc; }
        button { width: 85%; padding: 12px; background: #007bff; color: white; border: none; font-size: 16px; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
        #qrcode img { border: 10px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h2>会员码测试</h2>
    <input type="tel" id="txt" placeholder="输入手机号">
    <button onclick="go()">生成二维码</button>
    <div id="qrcode"></div>

    <script>
        function go() {
            var val = document.getElementById('txt').value;
            if(!val) return alert('请输入内容');
            var box = document.getElementById('qrcode');
            box.innerHTML = ""; // 清空旧图
            // 执行生成
            new QRCode(box, {
                text: val,
                width: 200,
                height: 200
            });
        }
    </script>
</body>
</html>
