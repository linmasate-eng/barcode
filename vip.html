<html>
<head>
    <title>会员二维码-离线版</title>

    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .nav-link { margin-bottom: 15px; font-size: 14px; color: #007bff; text-decoration: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .item { background: white; padding: 15px; border-radius: 10px; margin-top: 15px; width: 100%; max-width: 400px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; text-align: center; }
        .btn-del { position: absolute; right: 10px; top: 10px; color: #ccc; border: none; background: none; font-size: 20px; cursor: pointer; }
        .qr-box { display: flex; justify-content: center; margin-top: 10px; }
    </style>
</head>
<body>

    <a href="index.html" class="nav-link">← 返回补码工具</a>

    <div class="card">
        <h2 style="margin:10px 0;">会员二维码生成</h2>
        <input type="tel" id="phone" maxlength="11" placeholder="输入11位手机号">
        <input type="text" id="note" placeholder="备注姓名">
        <button onclick="saveQR()">生成并保存</button>
    </div>

    <div id="list" style="width:100%; max-width:400px;"></div>

    <script>
        window.onload = render;

        function saveQR() {
            let phone = document.getElementById('phone').value;
            let note = document.getElementById('note').value || "临时会员";
            if(phone.length !== 11) { alert("手机号需11位"); return; }

            let h = JSON.parse(localStorage.getItem('my_vips') || '[]');
            h.unshift({id: Date.now(), phone: phone, note: note});
            localStorage.setItem('my_vips', JSON.stringify(h));
            
            document.getElementById('phone').value = "";
            document.getElementById('note').value = "";
            render();
        }

        function render() {
            let h = JSON.parse(localStorage.getItem('my_vips') || '[]');
            let listDiv = document.getElementById('list');
            listDiv.innerHTML = "";

            h.forEach(item => {
                let div = document.createElement('div');
                div.className = 'item';
                let qrId = "qr-" + item.id;
                div.innerHTML = `
                    <button class="btn-del" onclick="del(${item.id})">×</button>
                    <div style="text-align:left; font-weight:bold;">${item.note} (${item.phone})</div>
                    <div id="${qrId}" class="qr-box"></div>
                `;
                listDiv.appendChild(div);

                // 直接生成
                new QRCode(document.getElementById(qrId), {
                    text: item.phone,
                    width: 160,
                    height: 160,
                    correctLevel: QRCode.CorrectLevel.H
                });
            });
        }

        function del(id) {
            let h = JSON.parse(localStorage.getItem('my_vips') || '[]').filter(x => x.id !== id);
            localStorage.setItem('my_vips', JSON.stringify(h));
            render();
        }
    </script>
</body>
</html>
